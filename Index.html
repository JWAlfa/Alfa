<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clocks</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            width: 320px;
        }
        h1 {
            margin-top: 0;
            font-size: 1.4rem;
            text-align: center;
        }
        .clock {
            display: grid;
            gap: 16px;
            margin-top: 24px;
        }
        .city {
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fafafa;
        }
        .city strong {
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Current Time</h1>
        <div class="clock">
            <div class="city">
                <strong>Sydney</strong>
                <span id="sydney-time">Loading...</span>
            </div>
            <div class="city">
                <strong>London</strong>
                <span id="london-time">Loading...</span>
            </div>
            <div class="city">
                <strong>Athens</strong>
                <span id="athens-time">Loading...</span>
            </div>
        </div>
    </div>
    <script>
        const formatTime = (zone) => {
            return new Intl.DateTimeFormat('en-GB', {
                timeZone: zone,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
                weekday: 'short',
                day: '2-digit',
                month: 'short',
                year: 'numeric'
            }).format(new Date());
        };

        const updateClocks = () => {
            document.getElementById('sydney-time').textContent = formatTime('Australia/Sydney');
            document.getElementById('london-time').textContent = formatTime('Europe/London');
            document.getElementById('athens-time').textContent = formatTime('Europe/Athens');
        };

        updateClocks();
        setInterval(updateClocks, 1000);
    </script>
</body>
</html>
